[build]
command = "cd artifacts/forceflow && pnpm install && PORT=3000 BASE_PATH=/ pnpm build"
publish = "artifacts/forceflow/dist/public"

[build.environment]
NODE_VERSION = "22"
PNPM_VERSION = "9"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
command = "cd artifacts/forceflow && pnpm install && PORT=3000 BASE_PATH=/ pnpm build"

[context.deploy-preview]
command = "cd artifacts/forceflow && pnpm install && PORT=3000 BASE_PATH=/ pnpm build"
