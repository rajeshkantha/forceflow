      properties:
        id:
          type: string
        tenantId:
          type: string
        threadId:
          type: string
        orgId:
          type: string
        requirementSummary:
          type: string
        currentStateAnalysis:
          type: ["object", "null"]
        gapAnalysis:
          type: ["object", "null"]
        implementationPlan:
          type: ["object", "null"]
        status:
          type: string
          enum: [draft, approved, executing, done, failed]
        createdBy:
          type: ["string", "null"]
        approvedBy:
          type: ["string", "null"]
        approvedAt:
          type: ["string", "null"]
          format: date-time
        executionLog:
          type: ["object", "null"]
        createdAt:
          type: string
          format: date-time

    # ─── PIPELINES ─────────────────────────────────────────────────────────
    PipelineRun:
      type: object
      required: [id, tenantId, status, createdAt]
      properties:
        id:
          type: string
        tenantId:
          type: string
        gitConnectionId:
          type: ["string", "null"]
        triggerType:
          type: ["string", "null"]
        branch:
          type: ["string", "null"]
        commitSha:
          type: ["string", "null"]
        commitMessage:
          type: ["string", "null"]
        stages:
          type: ["object", "null"]
        status:
          type: string
          enum: [pending, running, passed, failed, cancelled]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time

    PipelineApprovalInput:
      type: object
      required: [stage, decision]
      properties:
        stage:
          type: string
        decision:
          type: string
          enum: [approved, rejected]
