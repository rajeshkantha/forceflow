          type: string
        threadId:
          type: string
        messageId:
          type: ["string", "null"]
        toolName:
          type: string
        args:
          type: object
        status:
          type: string
          enum: [pending, approved, rejected]
        approvedBy:
          type: ["string", "null"]
        approvedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

