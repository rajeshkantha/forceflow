          type: string

    ApprovalResponseInput:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, rejected]

    ToolApproval:
      type: object
      required: [id, tenantId, threadId, toolName, status, createdAt]
      properties:
        id:
          type: string
