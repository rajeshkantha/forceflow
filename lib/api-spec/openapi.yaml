          $ref: "#/components/schemas/ChatThread"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    ChatMessage:
      type: object
      required: [id, threadId, role, createdAt]
      properties:
        id:
          type: string
        threadId:
          type: string
        role:
          type: string
          enum: [user, assistant, tool]
        content:
          type: ["string", "null"]
        parts:
          type: ["object", "null"]
        toolCallId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
